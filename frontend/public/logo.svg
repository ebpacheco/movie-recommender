<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow_center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c518" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#08080c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="40%" stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="#08080c"/>

  <!-- Halo radial -->
  <circle cx="100" cy="100" r="80" fill="url(#glow_center)"/>

  <!-- Formato olho externo -->
  <path d="M14,100 Q100,18 186,100 Q100,182 14,100 Z"
    fill="none" stroke="url(#gold)" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Íris anel externo -->
  <circle cx="100" cy="100" r="46" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.85"/>

  <!-- Íris anel médio -->
  <circle cx="100" cy="100" r="34" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.45"/>

  <!-- Íris anel interno -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.3"/>

  <!-- Pupila fundo -->
  <circle cx="100" cy="100" r="18" fill="#f5c518" opacity="0.07"/>

  <!-- Linhas de íris -->
  <line x1="100" y1="54"  x2="100" y2="66"  stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="134" x2="100" y2="146" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
  <line x1="54"  y1="100" x2="66"  y2="100" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
  <line x1="134" y1="100" x2="146" y2="100" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>

  <!-- Linhas diagonais da íris -->
  <line x1="67"  y1="67"  x2="75"  y2="75"  stroke="url(#gold)" stroke-width="1" opacity="0.35"/>
  <line x1="133" y1="67"  x2="125" y2="75"  stroke="url(#gold)" stroke-width="1" opacity="0.35"/>
  <line x1="67"  y1="133" x2="75"  y2="125" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>
  <line x1="133" y1="133" x2="125" y2="125" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>

  <!-- Play button -->
  <polygon points="90,88 90,112 114,100" fill="url(#gold)" filter="url(#glow)" opacity="0.95"/>

  <!-- Reflexo de luz no olho -->
  <circle cx="118" cy="82" r="5" fill="#fffde0" opacity="0.18"/>
  <circle cx="122" cy="78" r="2.5" fill="#fffde0" opacity="0.12"/>

  <!-- Canto esquerdo/direito do olho (pontas) -->
  <circle cx="14"  cy="100" r="3" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="186" cy="100" r="3" fill="url(#gold)" filter="url(#glow)"/>
</svg>