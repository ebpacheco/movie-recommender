<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Recommender</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
      .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #e94560; }
      h2 { font-size: 1.3rem; margin-bottom: 1.5rem; color: #aaa; }
      .form { display: flex; flex-direction: column; gap: 0.8rem; }
      input { padding: 0.8rem; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 1rem; }
      button { padding: 0.8rem; border-radius: 6px; border: none; background: #e94560; color: white; font-size: 1rem; cursor: pointer; }
      button:hover { background: #c73652; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { background: #5c1a1a; padding: 0.8rem; border-radius: 6px; color: #ff8080; }
      .movie-card { background: #16213e; padding: 1.2rem; border-radius: 8px; margin-bottom: 1rem; }
      .movie-card h3 { color: #e94560; margin-bottom: 0.3rem; }
      .genre { color: #aaa; font-size: 0.9rem; margin-bottom: 0.5rem; }
      .prompt-box { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
      .prompt-box input { flex: 1; }
      .prompt-box button { white-space: nowrap; }
      header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
      .logout { background: #444; padding: 0.4rem 0.8rem; font-size: 0.85rem; }
      .history-item { background: #16213e; padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; cursor: pointer; }
      .history-item:hover { background: #1e2d50; }
      hr { border-color: #333; margin: 1.5rem 0; }
      small { color: #888; }
      p { margin: 1rem 0; color: #aaa; }
      a { color: #e94560; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
